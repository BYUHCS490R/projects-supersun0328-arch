<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header></header>
    <nav></nav>
    <main>
        <form action="formprocs.html" method="get">
            <div>
                <label for="fname">Name</label>
                <input type="text" name="fullname" id="fname" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>
            <div>
                <label for="password">password</label>
                <input type="password" name="pass" id="password">
            </div>
            <div>
                <label for="stats">States</label>
                <select name="state" id="state">
                    <option values="blank">------</option>
                    <option values="CA">California</option>
                    <option values="HI">Hawaii</option>
                    <option values="UI">Utah</option>
                </select>
            </div>
            <div>
                <label><input type="radio" name="gender" value="male">male</label>
                <label><input type="radio" name="gender" value="male">female</label>
                <label><input type="radio" name="gender" value="male">male</label>
                <label><input type="radio" name="gender" value="male">male</label>
                <label><input type="radio" name="gender" value="male">male</label>
            </div>
            <div>
                <label><input type="checkbox" name="gender" value="male">male</label>
            </div>
            <div>
                <input type="submit" value="sleep">
            </div>
        </form>
    </main>
    <footer>
        <p>&copy;David Sun 2026</p>
    </footer>
</body>
</html>
