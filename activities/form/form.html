<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <header></header>
    <nav></nav>
    <main>
        <div id="message"></div>
        <form action="form.html" method="get">
            <fieldset>
                <legend>assignment</legend>

                <div class="form-row">
                    <label for="fname">Name:</label>
                    <input type="text" name="fullname" id="fname" required>
                </div>

                <div class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>

                <div class="form-row">
                    <label for="password">password:</label>
                    <input type="password" name="pass" id="password">
                </div>

                <div class="form-row">
                    <label for="state">States:</label>
                    <select name="state" id="state">
                        <option value="">------</option>
                        <option value="CA">California</option>
                        <option value="HI">Hawaii</option>
                        <option value="UT">Utah</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="age">Age:</label>
                    <input type="number" name="age" id="age">
                </div>

                <div class="check-row">
                    <div class="spacer">gender:</div>
                    <label><input type="radio" name="gender" value="male">male</label>
                    <label><input type="radio" name="gender" value="female">female</label>
                </div>

                <div class="check-row">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="agree" value="yes">male</label>
                </div>

                <div class="form-row">
                    <div class="spacer"></div>
                    <input type="submit" value="sleep">  
                </div>
            </fieldset>
        </form>

        <h2>What is AJAX?</h2>
        <p>AJAX is a way to send and receive data from a server without reloading the whole web page.</p>

        <h2>What are the two ways you can run JavaScript?</h2>
        <p>It keeps the code organized, easier to maintain, and allows the browser to load it faster using caching.</p>
    </main>

    <footer>
        <p>&copy;David Sun 2026</p>
    </footer>

    <script src="form.js"></script>
</body>
</html>
