<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
     <header>
        <h1>Form Assignment</h1>
    </header>
    <nav></nav>
    <main>
        <form action="formprocs.html" method="get">
            <fieldset>
                <legend>assignment</legend>

                <div class="form-row">
                    <label for="fname">Name:</label>
                    <input type="text" name="fullname" id="fname" required>
                </div>

                <div class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>

                <div class="form-row">
                    <label for="password">Password:</label>
                    <input type="password" name="pass" id="password">
                </div>

                <div class="form-row">
                    <label for="phone">Phone:</label>
                    <input type="tel" name="phone" id="phone">
                </div>

                <div class="form-row">
                    <label for="birthdate">Birth Date:</label>
                    <input type="date" name="birthdate" id="birthdate">
                </div>

                <div class="form-row">
                    <label for="state">States:</label>
                    <select name="state" id="state">
                        <option value="">------</option>
                        <option value="CA">here</option>
                        <option value="HI">there</option>
                        <option value="UT">somewhere</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="comments">Comments:</label>
                    <textarea name="comments" id="comments" rows="4" cols="30"></textarea>
                </div>

                <div class="check-row">
                    <div class="spacer">Gender:</div>
                    <label><input type="radio" name="gender" value="male"> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                </div>

                <div class="check-row">
                    <div class="spacer">Hobbies:</div>
                    <label><input type="checkbox" name="hobby" value="music"> Music</label>
                    <label><input type="checkbox" name="hobby" value="games"> Games</label>
                    <label><input type="checkbox" name="hobby" value="art"> Art</label>
                </div>

                <div class="check-row">
                    <div class="spacer"></div>
                    <label><input type="checkbox" name="agree" value="yes"> I agree to the terms</label>
                </div>

                <div class="form-row">
                    <div class="spacer"></div>
                    <input type="submit" value="Submit">
                </div>
            </fieldset>
        </form>  
    </main>
    <footer>
        <p>&copy; David Sun 2026</p>
    </footer>
</body>
</html>
